<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Whom Should AI Be Aligned? — An Interactive Essay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,300;1,6..72,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script>(function(){var t=localStorage.getItem('aa-theme');if(t)document.documentElement.setAttribute('data-theme',t)})()</script>
<style>
/* ========== RESET ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

/* ========== CUSTOM PROPERTIES (LGP Design System — dark default) ========== */
:root {
  /* Surfaces — warm, like a dimly lit study */
  --bg-primary: #121210;
  --bg-secondary: #1C1A17;
  --bg-tertiary: #2A2724;
  --bg-elevated: #3D3935;

  /* Text — warm off-white, never pure */
  --text-primary: #F5F5F0;
  --text-heading: #F5F5F0;
  --text-secondary: #A8A29E;
  --text-tertiary: #78716C;

  /* Brand & accent */
  --brand-teal: #3A7A7A;
  --accent-amber: #D4A017;
  --accent-gold: #D4A017;

  /* Role accents — warmed to fit stone palette */
  --accent-anthropic: #C47A4A;
  --accent-government: #5A7A94;
  --accent-claude: #8A7090;

  /* Semantic */
  --danger: #B54A4A;

  /* Borders */
  --border: #3D3935;

  /* Typography — Newsreader (editorial heading) + Source Sans 3 (humanist body/UI) */
  --font-heading: 'Newsreader', Georgia, serif;
  --font-body: 'Source Sans 3', -apple-system, sans-serif;
  --font-ui: 'Source Sans 3', -apple-system, sans-serif;
  --font-mono: 'Courier New', monospace;

  /* Transitions */
  --transition-smooth: 400ms ease-out;
  --transition-long: 600ms ease-out;

  /* Layout */
  --max-prose: 680px;
  --radius-sm: 0.25rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;

  /* Dynamic accent (set by JS per role) */
  --accent-current: var(--accent-gold);
}

/* ========== LIGHT MODE ========== */
[data-theme="light"] {
  --bg-primary: #FAFAF8;
  --bg-secondary: #F2F0EC;
  --bg-tertiary: #E5E2DC;
  --bg-elevated: #D1CCC4;
  --text-primary: #1C1917;
  --text-heading: #1C1917;
  --text-secondary: #57534E;
  --text-tertiary: #A8A29E;
  --brand-teal: #1A3A3A;
  --accent-amber: #B8860B;
  --accent-gold: #B8860B;
  --border: #D1CCC4;
  --accent-anthropic: #A0623A;
  --accent-government: #4A6A8A;
  --accent-claude: #6A5060;
}

/* ========== BASE ========== */
body {
  font-family: var(--font-body);
  font-size: 1.15rem;
  line-height: 1.75;
  color: var(--text-primary);
  background: var(--bg-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ========== PROGRESS BAR ========== */
#progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  width: 0%;
  background: var(--accent-current);
  z-index: 1000;
  transition: width var(--transition-smooth), background var(--transition-smooth);
}

/* ========== APP CONTAINER ========== */
#app {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
  min-height: 100vh;
}

/* ========== SCENE TRANSITIONS ========== */
.scene { opacity: 0; transform: translateY(20px); }
.scene.scene-enter { opacity: 1; transform: translateY(0); transition: opacity var(--transition-long), transform var(--transition-long); }

/* ========== HERO SCREEN ========== */
.hero { text-align: center; padding: 8vh 0 4vh; }
.hero-dateline {
  font-family: var(--font-ui);
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 1.5rem;
}
.hero-title {
  font-family: var(--font-heading);
  font-weight: 300;
  font-size: 3.2rem;
  line-height: 1.1;
  color: var(--text-heading);
  margin-bottom: 1.5rem;
}
@media (min-width: 640px) { .hero-title { font-size: 4.5rem; } }
.hero-subtitle {
  font-family: var(--font-heading);
  font-size: 1.25rem;
  font-weight: 300;
  color: var(--text-secondary);
  max-width: var(--max-prose);
  margin: 0 auto 2rem;
  font-style: italic;
}
.hero-byline {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 3rem;
}
.hero-byline a { color: var(--accent-gold); text-decoration: none; }
.hero-byline a:hover { text-decoration: underline; }
.hero-prompt {
  font-family: var(--font-ui);
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-heading);
  margin-bottom: 2rem;
  letter-spacing: 0.05em;
}

/* ========== ROLE CARDS ========== */
.role-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1.25rem;
  max-width: 800px;
  margin: 0 auto;
}
@media (min-width: 640px) { .role-grid { grid-template-columns: repeat(3, 1fr); } }
.role-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 2rem 1.5rem;
  cursor: pointer;
  transition: transform var(--transition-smooth), border-color var(--transition-smooth), box-shadow var(--transition-smooth);
  text-align: left;
}
.role-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 40px rgba(28,25,23,0.35);
}
.role-card[data-role="anthropic"] { border-top: 3px solid var(--accent-anthropic); }
.role-card[data-role="anthropic"]:hover { border-color: var(--accent-anthropic); }
.role-card[data-role="government"] { border-top: 3px solid var(--accent-government); }
.role-card[data-role="government"]:hover { border-color: var(--accent-government); }
.role-card[data-role="claude"] { border-top: 3px solid var(--accent-claude); }
.role-card[data-role="claude"]:hover { border-color: var(--accent-claude); }
.role-card-icon { font-size: 2rem; margin-bottom: 0.75rem; }
.role-card-title {
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 1.35rem;
  color: var(--text-heading);
  margin-bottom: 0.25rem;
}
.role-card-you {
  font-family: var(--font-ui);
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.75rem;
}
.role-card[data-role="anthropic"] .role-card-you { color: var(--accent-anthropic); }
.role-card[data-role="government"] .role-card-you { color: var(--accent-government); }
.role-card[data-role="claude"] .role-card-you { color: var(--accent-claude); }
.role-card-desc {
  font-family: var(--font-ui);
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ========== STORY PANEL ========== */
.story-panel { max-width: var(--max-prose); margin: 0 auto; }
.story-chapter {
  font-family: var(--font-ui);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 0.5rem;
}
.story-dateline {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  color: var(--accent-current);
  font-weight: 500;
  margin-bottom: 1.5rem;
}
.story-title {
  font-family: var(--font-heading);
  font-weight: 400;
  font-size: 2rem;
  color: var(--text-heading);
  margin-bottom: 1.5rem;
  line-height: 1.2;
}
.story-prose {
  margin-bottom: 2rem;
  color: var(--text-primary);
}
.story-prose p { margin-bottom: 1rem; }
.story-prose p:last-child { margin-bottom: 0; }

/* ========== CHOICE BUTTONS ========== */
.choices { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 2.5rem; }
.choice-btn {
  display: block;
  width: 100%;
  text-align: left;
  font-family: var(--font-ui);
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-heading);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 1rem 1.25rem;
  cursor: pointer;
  transition: border-color var(--transition-smooth), background var(--transition-smooth), transform 150ms ease;
  line-height: 1.4;
}
.choice-btn:hover {
  border-color: var(--accent-current);
  background: var(--bg-tertiary);
  transform: translateX(4px);
}
.choice-btn .choice-label {
  display: inline-block;
  font-weight: 700;
  margin-right: 0.5rem;
  color: var(--accent-current);
}

/* ========== REVEAL BOX ========== */
.reveal-box {
  background: var(--bg-secondary);
  border-left: 3px solid var(--accent-gold);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  padding: 1.5rem;
  margin: 2rem 0;
  opacity: 0;
  transform: translateX(-20px);
  transition: opacity var(--transition-long), transform var(--transition-long);
}
.reveal-box.reveal-visible { opacity: 1; transform: translateX(0); }
.reveal-box-header {
  font-family: var(--font-ui);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent-gold);
  margin-bottom: 0.75rem;
}
.reveal-box-content {
  font-size: 1rem;
  line-height: 1.6;
  color: var(--text-primary);
}
.reveal-box-content p { margin-bottom: 0.75rem; }
.reveal-box-content p:last-child { margin-bottom: 0; }

/* ========== DWARKESH QUOTE ========== */
.dwarkesh-quote {
  border-left: 3px solid var(--accent-gold);
  padding: 1.25rem 1.5rem;
  margin: 2rem 0;
  background: rgba(212, 160, 23, 0.05);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
}
.dwarkesh-quote p {
  font-style: italic;
  color: var(--text-heading);
  font-size: 1.1rem;
  line-height: 1.6;
  margin-bottom: 0.5rem;
}
.dwarkesh-quote cite {
  font-family: var(--font-ui);
  font-style: normal;
  font-size: 0.8rem;
  color: var(--accent-gold);
}

/* ========== ENDING SCREEN ========== */
.ending { max-width: var(--max-prose); margin: 0 auto; text-align: center; }
.ending-badge {
  display: inline-block;
  font-family: var(--font-ui);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.5rem 1.25rem;
  border: 2px solid var(--accent-current);
  border-radius: 50px;
  color: var(--accent-current);
  margin-bottom: 1.5rem;
}
.ending-title {
  font-family: var(--font-heading);
  font-weight: 300;
  font-size: 2.5rem;
  color: var(--text-heading);
  margin-bottom: 1rem;
  line-height: 1.15;
}
.ending-prose {
  text-align: left;
  margin-bottom: 2rem;
}
.ending-prose p { margin-bottom: 1rem; }

/* ========== SUMMARY SCREEN ========== */
.summary { max-width: 800px; margin: 0 auto; }
.summary-heading {
  font-family: var(--font-heading);
  font-weight: 300;
  font-size: 2.5rem;
  color: var(--text-heading);
  text-align: center;
  margin-bottom: 0.5rem;
}
.summary-sub {
  font-family: var(--font-ui);
  font-size: 1rem;
  color: var(--text-secondary);
  text-align: center;
  margin-bottom: 3rem;
}

/* Choice path visualisation */
.path-viz {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 3rem;
  position: relative;
}
.path-node {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  padding: 1rem 0;
}
.path-dot-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 24px;
}
.path-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent-current);
  border: 2px solid var(--bg-primary);
  flex-shrink: 0;
}
.path-line {
  width: 2px;
  flex: 1;
  background: var(--border);
  min-height: 20px;
}
.path-content {}
.path-node-title {
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text-heading);
  margin-bottom: 0.2rem;
}
.path-node-choice {
  font-family: var(--font-ui);
  font-size: 0.8rem;
  color: var(--text-secondary);
}

/* Meta lesson */
.meta-lesson {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 2rem;
  margin-bottom: 2rem;
  text-align: center;
}
.meta-lesson-title {
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 1.35rem;
  color: var(--text-heading);
  margin-bottom: 1rem;
}
.meta-lesson p {
  font-size: 1rem;
  color: var(--text-secondary);
  max-width: var(--max-prose);
  margin: 0 auto 0.75rem;
}

/* Questions */
.unanswered-questions {
  margin-bottom: 2.5rem;
}
.unanswered-questions h3 {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 1rem;
  text-align: center;
}
.question-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.question-list li {
  font-family: var(--font-ui);
  font-size: 0.95rem;
  color: var(--text-primary);
  padding: 0.75rem 1rem;
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  border-left: 3px solid var(--accent-gold);
}

/* Completed roles */
.completed-roles {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}
.completed-badge {
  font-family: var(--font-ui);
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.35rem 0.75rem;
  border-radius: 50px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}
.completed-badge.done { border-color: var(--accent-gold); color: var(--accent-gold); }

/* ========== ACTION BUTTONS ========== */
.btn-row {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 2rem;
}
.btn {
  font-family: var(--font-ui);
  font-size: 0.9rem;
  font-weight: 600;
  padding: 0.75rem 1.75rem;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  transition: transform 150ms ease, box-shadow var(--transition-smooth);
}
.btn:hover { transform: translateY(-2px); }
.btn-primary {
  background: var(--accent-current);
  color: var(--bg-primary);
}
.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-primary);
}
.btn-secondary:hover { border-color: var(--text-secondary); }

/* ========== CONTINUE BUTTON ========== */
.continue-btn {
  display: block;
  width: 100%;
  max-width: var(--max-prose);
  margin: 2rem auto 0;
  font-family: var(--font-ui);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-heading);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 1rem;
  cursor: pointer;
  transition: border-color var(--transition-smooth), background var(--transition-smooth);
  text-align: center;
}
.continue-btn:hover { border-color: var(--accent-current); background: var(--bg-tertiary); }

/* ========== ESSAY LINK ========== */
.essay-link {
  text-align: center;
  margin: 2rem 0;
}
.essay-link a {
  font-family: var(--font-ui);
  font-size: 0.9rem;
  color: var(--accent-gold);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color var(--transition-smooth);
}
.essay-link a:hover { border-bottom-color: var(--accent-gold); }

/* ========== HERO ANIMATION ========== */
.hero-title {
  animation: heroTitleIn 1s ease-out forwards;
}
@keyframes heroTitleIn {
  from { opacity: 0; transform: translateY(24px); letter-spacing: 0.05em; }
  to { opacity: 1; transform: translateY(0); letter-spacing: 0; }
}
.hero-subtitle { animation: fadeIn 1s ease-out 0.3s both; }
.hero-byline { animation: fadeIn 1s ease-out 0.5s both; }
.hero-prompt { animation: fadeIn 0.8s ease-out 0.7s both; }
.role-card:nth-child(1) { animation: cardIn 0.6s ease-out 0.8s both; }
.role-card:nth-child(2) { animation: cardIn 0.6s ease-out 0.95s both; }
.role-card:nth-child(3) { animation: cardIn 0.6s ease-out 1.1s both; }
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== CHOICE STAGGER ========== */
.choices .choice-btn:nth-child(1) { animation: fadeIn 0.4s ease-out 0.1s both; }
.choices .choice-btn:nth-child(2) { animation: fadeIn 0.4s ease-out 0.2s both; }
.choices .choice-btn:nth-child(3) { animation: fadeIn 0.4s ease-out 0.3s both; }

/* ========== PROSE EMPHASIS ========== */
.story-prose em, .ending-prose em, .reveal-box-content em {
  color: var(--text-heading);
  font-style: italic;
}

/* ========== FOCUS STYLES ========== */
.choice-btn:focus-visible, .btn:focus-visible, .continue-btn:focus-visible, .role-card:focus-visible {
  outline: 2px solid var(--brand-teal);
  outline-offset: 2px;
}
.role-card { position: relative; }
.role-card:focus-visible { border-color: var(--brand-teal); }

/* ========== CODE STYLING ========== */
code {
  font-family: var(--font-mono);
  font-size: 0.85em;
  background: var(--bg-tertiary);
  padding: 0.15em 0.4em;
  border-radius: var(--radius-sm);
  color: var(--accent-claude);
}

/* ========== STRONG IN REVEALS ========== */
.reveal-box-content strong {
  color: var(--text-heading);
  font-weight: 600;
}
.reveal-box-content a {
  color: var(--accent-gold);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color var(--transition-smooth);
}
.reveal-box-content a:hover {
  border-bottom-color: var(--accent-gold);
}

/* ========== SUMMARY REVEAL TOGGLES ========== */
.summary-chapter {
  margin-bottom: 1.5rem;
}
.summary-chapter-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  cursor: pointer;
  padding: 0.75rem 1rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  transition: border-color var(--transition-smooth), background var(--transition-smooth);
  user-select: none;
}
.summary-chapter-header:hover {
  border-color: var(--accent-current);
  background: var(--bg-tertiary);
}
.summary-chapter-arrow {
  font-family: var(--font-ui);
  font-size: 0.75rem;
  color: var(--text-secondary);
  transition: transform 200ms ease;
  flex-shrink: 0;
}
.summary-chapter.open .summary-chapter-arrow {
  transform: rotate(90deg);
}
.summary-chapter-info {
  flex: 1;
  min-width: 0;
}
.summary-chapter-title {
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text-heading);
}
.summary-chapter-choice {
  font-family: var(--font-ui);
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 0.15rem;
}
.summary-chapter-body {
  display: none;
  padding: 1rem 1rem 0.5rem;
  border-left: 2px solid var(--border);
  margin-left: 1.25rem;
  margin-top: 0.5rem;
}
.summary-chapter.open .summary-chapter-body {
  display: block;
}
.summary-chapter-body .reveal-box {
  opacity: 1;
  transform: none;
  margin-bottom: 1rem;
}
.summary-chapter-body .dwarkesh-quote {
  margin-bottom: 1rem;
}

/* ========== ENDINGS GALLERY ========== */
.endings-gallery {
  margin: 2.5rem 0;
}
.endings-gallery-title {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 1rem;
  text-align: center;
}
.endings-role-group {
  margin-bottom: 1.5rem;
}
.endings-role-label {
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 0.5rem;
  padding-left: 0.25rem;
}
.endings-role-label.anthropic { color: var(--accent-anthropic); }
.endings-role-label.government { color: var(--accent-government); }
.endings-role-label.claude { color: var(--accent-claude); }
.endings-list {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}
.ending-slot {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.5rem 0.75rem;
  background: var(--bg-secondary);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: var(--font-ui);
  font-size: 0.85rem;
}
.ending-slot-icon {
  flex-shrink: 0;
  width: 1.25rem;
  text-align: center;
  font-size: 0.75rem;
}
.ending-slot.locked .ending-slot-name {
  font-family: var(--font-mono);
  color: var(--text-secondary);
  opacity: 0.5;
  letter-spacing: 0.05em;
}
.ending-slot.unlocked .ending-slot-name {
  color: var(--text-heading);
  font-weight: 500;
}
.ending-slot.unlocked {
  border-color: var(--accent-current);
}
.ending-slot.current {
  border-color: var(--accent-gold);
  background: rgba(212, 160, 23, 0.08);
}
.ending-slot.current .ending-slot-name {
  color: var(--accent-gold);
  font-weight: 600;
}

/* ========== DECISION TREE ========== */
.tree-section {
  margin: 2rem calc(-50vw + 50%) 2.5rem;
  padding: 0 1rem;
  width: 100vw;
}
.tree-section-title {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-secondary);
  text-align: center;
  margin-bottom: 0.5rem;
}
.tree-section-stamp {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--danger);
  text-align: center;
  opacity: 0.6;
  margin-bottom: 1rem;
}
.tree-container {
  position: relative;
  overflow-x: auto;
  overflow-y: hidden;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-secondary);
  -webkit-overflow-scrolling: touch;
}
.tree-canvas {
  position: relative;
  transform-origin: top left;
}
.tree-canvas svg {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
}
.tree-node {
  position: absolute;
  padding: 0.3rem 0.35rem;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  text-align: center;
  font-family: var(--font-ui);
  font-size: 0.58rem;
  line-height: 1.25;
  z-index: 1;
}
.tree-node.root-node {
  border-color: var(--accent-gold);
  background: rgba(212, 160, 23, 0.1);
}
.tree-node.root-node .tree-node-label {
  color: var(--accent-gold);
  font-weight: 600;
}
.tree-node.ending-node {
  border-radius: 16px;
}
.tree-node.state-current {
  border-color: var(--accent-current);
  box-shadow: 0 0 10px color-mix(in srgb, var(--accent-current) 30%, transparent);
  background: color-mix(in srgb, var(--accent-current) 8%, transparent);
}
.tree-node.state-current .tree-node-label {
  color: var(--text-heading);
  font-weight: 600;
}
.tree-node.state-visited {
  border-color: var(--text-secondary);
}
.tree-node.state-visited .tree-node-label {
  color: var(--text-primary);
}
.tree-node.state-redacted {
  opacity: 0.35;
}
.tree-node.state-redacted .tree-node-label {
  filter: blur(4px);
  user-select: none;
}
.tree-edge {
  fill: none;
}
.tree-edge.state-current {
  stroke: var(--accent-current);
  stroke-width: 2;
  stroke-dasharray: 1000;
  stroke-dashoffset: 1000;
  animation: drawEdge 1.5s ease-out forwards;
}
@keyframes drawEdge {
  to { stroke-dashoffset: 0; }
}
.tree-edge.state-visited {
  stroke: var(--text-secondary);
  stroke-width: 1;
  opacity: 0.4;
}
.tree-edge.state-redacted {
  stroke: var(--text-secondary);
  stroke-width: 1;
  stroke-dasharray: 3 5;
  opacity: 0.15;
}

/* ========== SKIP LINK ========== */
.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: var(--brand-teal);
  color: var(--text-primary);
  padding: 0.5rem 1rem;
  z-index: 2000;
  font-family: var(--font-ui);
  font-size: 0.9rem;
  text-decoration: none;
  transition: top 200ms;
}
.skip-link:focus { top: 0; }

/* ========== THEME TOGGLE ========== */
#theme-toggle {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 1001;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 1.1rem;
  padding: 0.4rem 0.6rem;
  cursor: pointer;
  font-family: var(--font-ui);
  line-height: 1;
  transition: border-color var(--transition-smooth), background var(--transition-smooth);
}
#theme-toggle:hover { border-color: var(--text-secondary); background: var(--bg-tertiary); }
#theme-toggle:focus-visible { outline: 2px solid var(--brand-teal); outline-offset: 2px; }

/* ========== UTILITIES ========== */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
.fade-in { animation: fadeIn var(--transition-long) ease-out forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>

const GameState = {

  currentRole: null,
  currentNode: null,
  choices: [],

  ending: null,

function setRoleAccent(role) {
  const map = { anthropic: 'var(--accent-anthropic)', government: 'var(--accent-government)', claude: 'var(--accent-claude)' };
  document.documentElement.style.setProperty('--accent-current', map[role] || 'var(--accent-gold)');
}

function updateProgress() {
  const bar = document.getElementById('progress-bar');
  if (!GameState.currentRole || GameState.screen === 'hero') { bar.style.width = '0%'; return; }
  const totalNodes = 5;
  const pct = Math.min(100, (GameState.chapter / totalNodes) * 100);
  bar.style.width = pct + '%';
}

function saveState() {
  localStorage.setItem('aa_completedRoles', JSON.stringify(GameState.completedRoles));
  localStorage.setItem('aa_allPlaythroughs', JSON.stringify(GameState.allPlaythroughs));
  localStorage.setItem('aa_unlockedEndings', JSON.stringify(GameState.unlockedEndings));
}

function scrambleText(text) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*';
  return text.split('').map(c => c === ' ' ? ' ' : chars[Math.floor(Math.random() * chars.length)]).join('');
}

function getEndingsForRole(role) {
  const data = STORY_DATA[role];
  if (!data || !data._endings) return [];
  return Object.entries(data._endings).map(([id, e]) => ({ id, title: e.title, badge: e.badge }));
}

function isEndingUnlocked(role, endingId) {
  return GameState.unlockedEndings[role] && GameState.unlockedEndings[role].includes(endingId);
}

function unlockEnding(role, endingId) {
  if (!GameState.unlockedEndings[role]) GameState.unlockedEndings[role] = [];
  if (!GameState.unlockedEndings[role].includes(endingId)) {
    GameState.unlockedEndings[role].push(endingId);
  }
}

function renderTree() {
  const COL_W = 100;
  const ROW_H = 90;
  const PAD_X = 30;
  const PAD_Y = 25;
  const NODE_W = 85;
  const NODE_H = 34;

  // Build visited set from all playthroughs
  const visited = new Set();
  const visitedEdges = new Set();
  GameState.allPlaythroughs.forEach(pt => {
    visited.add('root');
    const startNode = pt.role === 'anthropic' ? 'A1' : pt.role === 'government' ? 'G1' : 'C1';
    visitedEdges.add('root->' + startNode);
    pt.choices.forEach((c, i) => {
      visited.add(c.nodeId);
      if (i < pt.choices.length - 1) visitedEdges.add(c.nodeId + '->' + pt.choices[i + 1].nodeId);
    });
    if (pt.ending) {
      visited.add(pt.ending);
      if (pt.choices.length > 0) visitedEdges.add(pt.choices[pt.choices.length - 1].nodeId + '->' + pt.ending);
    }
  });

  const currentPath = new Set();
  const currentEdges = new Set();
  if (GameState.currentRole) {
    currentPath.add('root');
    const sn = GameState.currentRole === 'anthropic' ? 'A1' : GameState.currentRole === 'government' ? 'G1' : 'C1';
    currentEdges.add('root->' + sn);
    GameState.choices.forEach((c, i) => {
      currentPath.add(c.nodeId);
      if (i < GameState.choices.length - 1) currentEdges.add(c.nodeId + '->' + GameState.choices[i + 1].nodeId);
    });
    if (GameState.ending) {
      currentPath.add(GameState.ending);
      if (GameState.choices.length > 0) currentEdges.add(GameState.choices[GameState.choices.length - 1].nodeId + '->' + GameState.ending);
    }
  }

  let maxCol = 0, maxRow = 0;
  Object.values(TREE_LAYOUT).forEach(n => { if (n.col > maxCol) maxCol = n.col; if (n.row > maxRow) maxRow = n.row; });
  const canvasW = (maxCol + 1) * COL_W + PAD_X * 2;
  const canvasH = (maxRow + 1) * ROW_H + PAD_Y * 2;

  // Node centre and edge connection points
  function centre(nodeId) {
    const n = TREE_LAYOUT[nodeId];
    return { x: PAD_X + n.col * COL_W + NODE_W / 2, y: PAD_Y + n.row * ROW_H + NODE_H / 2 };
  }
  function bottom(nodeId) { const c = centre(nodeId); return { x: c.x, y: c.y + NODE_H / 2 }; }
  function top(nodeId) { const c = centre(nodeId); return { x: c.x, y: c.y - NODE_H / 2 }; }

  // SVG edges - connect bottom of source to top of target
  let svgPaths = '';
  TREE_EDGES.forEach(([src, tgt]) => {
    const p1 = bottom(src);
    const p2 = top(tgt);
    const cy1 = p1.y + (p2.y - p1.y) * 0.4;
    const cy2 = p1.y + (p2.y - p1.y) * 0.6;
    let state = 'state-redacted';
    if (currentEdges.has(src + '->' + tgt)) state = 'state-current';
    else if (visitedEdges.has(src + '->' + tgt)) state = 'state-visited';
    svgPaths += '<path class="tree-edge ' + state + '" d="M' + p1.x + ',' + p1.y + ' C' + p1.x + ',' + cy1 + ' ' + p2.x + ',' + cy2 + ' ' + p2.x + ',' + p2.y + '" />';
  });

  // Node divs
  let nodesHtml = '';
  Object.entries(TREE_LAYOUT).forEach(([id, n]) => {
    const x = PAD_X + n.col * COL_W;
    const y = PAD_Y + n.row * ROW_H;
    let state = 'state-redacted';
    if (currentPath.has(id)) state = 'state-current';
    else if (visited.has(id)) state = 'state-visited';
    const typeClass = n.type === 'root' ? 'root-node' : n.type === 'ending' ? 'ending-node' : '';
    nodesHtml += '<div class="tree-node ' + state + ' ' + typeClass + '" style="left:' + x + 'px;top:' + y + 'px;width:' + NODE_W + 'px"><div class="tree-node-label">' + n.label + '</div></div>';
  });

  return '<div class="tree-section">' +
    '<div class="tree-section-title">Decision Map</div>' +
    '<div class="tree-section-stamp">// SECURITY CLASSIFICATION: NARRATIVE CLEARANCE REQUIRED //</div>' +
    '<div class="tree-container" id="tree-container">' +
      '<div class="tree-canvas" data-raw-w="' + canvasW + '" data-raw-h="' + canvasH + '" style="width:' + canvasW + 'px;height:' + canvasH + 'px">' +
        '<svg width="' + canvasW + '" height="' + canvasH + '">' + svgPaths + '</svg>' +
        nodesHtml +
      '</div>' +
    '</div>' +
  '</div>';
}

function render() {
  const app = document.getElementById('app');
  let html = '';
  switch (GameState.screen) {
    case 'hero': html = renderHero(); break;
    case 'story': html = renderStory(); break;
    case 'ending': html = renderEnding(); break;
    case 'summary': html = renderSummary(); break;
  }
  app.innerHTML = `<div class="scene" id="current-scene">${html}</div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const scene = document.getElementById('current-scene');
      if (scene) scene.classList.add('scene-enter');
    });
  });
  updateProgress();
  if (GameState.screen === 'summary') {
    requestAnimationFrame(() => { requestAnimationFrame(scaleTreeToFit); });
  }
}

function scaleTreeToFit() {
  const container = document.getElementById('tree-container');
  const canvas = container ? container.querySelector('.tree-canvas') : null;
  if (!container || !canvas) return;
  const rawW = parseInt(canvas.dataset.rawW);
  const rawH = parseInt(canvas.dataset.rawH);
  const availW = container.offsetWidth;
  if (availW >= rawW) {
    // Fits without scaling
    container.style.height = rawH + 'px';
  } else if (window.innerWidth >= 768) {
    // Desktop: scale to fit, no scrolling
    const scale = availW / rawW;
    canvas.style.transform = 'scale(' + scale + ')';
    canvas.style.transformOrigin = 'top left';
    container.style.height = Math.ceil(rawH * scale) + 'px';
    container.style.overflowX = 'hidden';
  } else {
    // Mobile: let it scroll horizontally at 0.7x scale
    canvas.style.transform = 'scale(0.7)';
    canvas.style.transformOrigin = 'top left';
    container.style.height = Math.ceil(rawH * 0.7) + 'px';
    // Wrap canvas to prevent dead scroll space
    const wrapper = document.createElement('div');
    wrapper.style.width = Math.ceil(rawW * 0.7) + 'px';
    wrapper.style.height = Math.ceil(rawH * 0.7) + 'px';
    wrapper.style.position = 'relative';
    canvas.parentNode.insertBefore(wrapper, canvas);
    wrapper.appendChild(canvas);
    // Auto-scroll to current role's branch
    const roleCols = { anthropic: 3, government: 10, claude: 17 };
    const col = roleCols[GameState.currentRole] || 10;
    const targetX = (30 + col * 100) * 0.7 - availW / 2;
    container.scrollLeft = Math.max(0, targetX);
  }
}

   ================================================================ */
document.getElementById('app').addEventListener('click', (e) => {
  const roleCard = e.target.closest('.role-card');
  if (roleCard) {
    const role = roleCard.dataset.role;
    GameState.currentRole = role;
    GameState.currentNode = role === 'anthropic' ? 'A1' : role === 'government' ? 'G1' : 'C1';
    GameState.choices = [];
    GameState.modifiers = new Set();
    GameState.chapter = 1;
    GameState.ending = null;
    GameState.screen = 'story';
    setRoleAccent(role);
    render();
    return;
  }

  const choiceBtn = e.target.closest('.choice-btn');
  if (choiceBtn) {
    const idx = parseInt(choiceBtn.dataset.choice);
    const node = STORY_DATA[GameState.currentRole][GameState.currentNode];
    const choice = node.choices[idx];

    GameState.choices.push({
      nodeId: GameState.currentNode,
      nodeTitle: node.title,
      choiceIndex: idx,
      choiceText: choice.text,
      reveal: node.reveal || null,
    });

    if (choice.modifier) GameState.modifiers.add(choice.modifier);
    advanceTo(choice);
    return;
  }

  const summaryBtn = e.target.closest('[data-action="summary"]');
  if (summaryBtn) {
    if (!GameState.completedRoles.includes(GameState.currentRole)) {
      GameState.completedRoles.push(GameState.currentRole);
    }
    unlockEnding(GameState.currentRole, GameState.ending);
    GameState.allPlaythroughs.push({
      role: GameState.currentRole,
      ending: GameState.ending,
      choices: [...GameState.choices],
    });
    saveState();
    GameState.screen = 'summary';
    render();
    return;
  }

  const playAgain = e.target.closest('[data-action="play-again"]');
  if (playAgain) {
    GameState.screen = 'hero';
    GameState.currentRole = null;
    GameState.currentNode = null;
    document.documentElement.style.setProperty('--accent-current', 'var(--accent-gold)');
    render();
    return;
  }

  const toggleChapter = e.target.closest('[data-action="toggle-chapter"]');
  if (toggleChapter) {
    const chapter = toggleChapter.closest('.summary-chapter');
    if (chapter) chapter.classList.toggle('open');
    return;
  }

  const resetAll = e.target.closest('[data-action="reset-all"]');
  if (resetAll) {
    GameState.completedRoles = [];
    GameState.allPlaythroughs = [];
    GameState.unlockedEndings = {};
    saveState();
    GameState.screen = 'hero';
    GameState.currentRole = null;
    document.documentElement.style.setProperty('--accent-current', 'var(--accent-gold)');
    render();
    return;
  }
});

function advanceTo(choice) {
  if (choice.ending) {
    GameState.ending = choice.ending;
    GameState.screen = 'ending';
    GameState.chapter++;
    render();
  } else if (choice.next) {
    GameState.currentNode = choice.next;
    GameState.chapter++;
    GameState.screen = 'story';
    render();
  }
}

/* Initial render */
render();

/* ========== THEME TOGGLE ========== */
(function() {
  var btn = document.getElementById('theme-toggle');
  function updateIcon() {
    var isLight = document.documentElement.getAttribute('data-theme') === 'light';
    btn.textContent = isLight ? '\u263E' : '\u2606';
  }
  updateIcon();
  btn.addEventListener('click', function() {
    var html = document.documentElement;
    var isLight = html.getAttribute('data-theme') === 'light';
    if (isLight) {
      html.removeAttribute('data-theme');
      localStorage.removeItem('aa-theme');
    } else {
      html.setAttribute('data-theme', 'light');
      localStorage.setItem('aa-theme', 'light');
    }
    updateIcon();
  });
})();
</script>
